name: Build & Push Playground (Docker Hub)

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  pull_request:
    paths:
      - "playground/**"
      - ".github/workflows/docker-playground.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Garante que NUNCA haverá push de imagem se a SDK estiver quebrada.
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: composer test

      - name: Run lint
        run: composer lint

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (CI)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./playground/Dockerfile
          push: false
          tags: asaas-sdk-argws-playground:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub secrets (safe)
        shell: bash
        run: |
          set -euo pipefail
          echo "DOCKERHUB_USERNAME length: ${#DOCKERHUB_USERNAME}"
          echo "DOCKERHUB_TOKEN length: ${#DOCKERHUB_TOKEN}"
          [[ -n "$DOCKERHUB_USERNAME" ]] || (echo "::error::Missing DOCKERHUB_USERNAME in Environment production" && exit 1)
          [[ -n "$DOCKERHUB_TOKEN" ]] || (echo "::error::Missing DOCKERHUB_TOKEN in Environment production" && exit 1)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Define tags (comma-separated)
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/asaas-sdk-argws-playground"
          TAGS="${IMAGE}:sha-${GITHUB_SHA}"

          # push na main => latest
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi

          # tag vX.Y.Z => vX.Y.Z
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VER="${{ github.ref_name }}"
            TAGS="${TAGS},${IMAGE}:${VER}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./playground/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
