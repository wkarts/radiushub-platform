name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
      PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
      PACKAGIST_PACKAGE_URL: ${{ secrets.PACKAGIST_PACKAGE_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
      - name: Atualizar Packagist via API (opcional)
        if: env.PACKAGIST_USERNAME != '' && env.PACKAGIST_TOKEN != '' && env.PACKAGIST_PACKAGE_URL != ''
        run: |
          curl -sS -X POST \
            -H 'Content-Type: application/json' \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_TOKEN}" \
            -d "{\"repository\":{\"url\":\"${PACKAGIST_PACKAGE_URL}\"}}"
