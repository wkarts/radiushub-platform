name: Audit Checklist

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'bin/**'
      - 'resources/**'
      - 'playground/**'
      - 'audit/**'
      - '.github/**'
      - 'composer.json'
      - 'composer.lock'

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install deps
        run: composer install --no-interaction --prefer-dist

      - name: Build SDK (OpenAPI + Generator)
        run: composer asaas:sdk-build

      - name: Ensure generated files are committed
        run: git diff --exit-code

      - name: Tests
        run: composer test

      - name: Lint (PHPStan + CS Fixer)
        run: composer lint

      - name: Parity
        run: composer asaas:verify

      - name: Audit report
        run: php bin/audit-report.php

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          path: audit/reports/*.md
          if-no-files-found: error
