# Para site PHP nativo, configure o Document Root no CloudPanel para /caminho/do/projeto/public.
# Acrescente estas regras à configuração do vhost, preservando o bloco PHP-FPM gerado pelo CloudPanel.

location / {
    try_files $uri $uri/ /index.php?$query_string;
}

location ~ /\.env {
    deny all;
}

location ~* ^/(storage|bootstrap/cache)/.*\.php$ {
    deny all;
}

location = /favicon.ico { access_log off; log_not_found off; }
location = /robots.txt  { access_log off; log_not_found off; }
