# RadiusHub nativo: use com Document Root apontando para __PROJECT_ROOT__/public.
location / {
    try_files $uri $uri/ /index.php?$query_string;
}
location ~ /\.(?!well-known).* { deny all; }
location ~* ^/(storage|bootstrap/cache)/.*\.php$ { deny all; }
location = /health/live { access_log off; try_files $uri /index.php?$query_string; }
location = /health/ready { access_log off; try_files $uri /index.php?$query_string; }
