# RadiusHub nativo no CloudPanel.
# Configure o Document Root do site para __PROJECT_ROOT__/public e preserve
# o bloco PHP-FPM gerado pelo CloudPanel. Adicione as diretivas abaixo ao vhost.

location / {
    try_files $uri $uri/ /index.php?$query_string;
}

location = /health/live {
    access_log off;
    try_files $uri /index.php?$query_string;
}

location = /health/ready {
    access_log off;
    try_files $uri /index.php?$query_string;
}

location ~ /\.(?!well-known).* {
    deny all;
}

location ~* ^/(storage|bootstrap/cache)/.*\.php$ {
    deny all;
}

location = /favicon.ico { access_log off; log_not_found off; }
location = /robots.txt  { access_log off; log_not_found off; }

client_max_body_size 32m;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
