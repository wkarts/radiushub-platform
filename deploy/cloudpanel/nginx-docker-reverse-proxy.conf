# RadiusHub Docker atrás do CloudPanel. O container web deve estar vinculado
# somente a 127.0.0.1:8080 (ou outra porta local escolhida).
location / {
    proxy_pass http://127.0.0.1:__APP_PORT__;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
}

location = /health/live {
    proxy_pass http://127.0.0.1:__APP_PORT__/health/live;
    access_log off;
}

location = /health/ready {
    proxy_pass http://127.0.0.1:__APP_PORT__/health/ready;
    access_log off;
}
