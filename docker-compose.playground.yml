services:
  app:
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      PLAYGROUND_MODE: "true"
      PLAYGROUND_BANNER: "true"
      PLAYGROUND_MIKROTIK_SIMULATOR: "true"
      SEED_DEMO: "true"
      AUTO_MIGRATE: "true"
      AUTO_SEED: "true"

  web:
    ports:
      - "${APP_BIND_ADDRESS:-127.0.0.1}:${APP_PORT:-8080}:80"

  worker:
    environment:
      APP_ENV: local
      PLAYGROUND_MODE: "true"
      PLAYGROUND_MIKROTIK_SIMULATOR: "true"
      AUTO_MIGRATE: "false"
      AUTO_SEED: "false"

  scheduler:
    environment:
      APP_ENV: local
      PLAYGROUND_MODE: "true"
      PLAYGROUND_MIKROTIK_SIMULATOR: "true"
      AUTO_MIGRATE: "false"
      AUTO_SEED: "false"

  freeradius:
    environment:
      # O playground possui cadastro NAS determinístico. Evita HUP durante o
      # smoke RADIUS e elimina flutuações causadas por last_seen_at/updated_at.
      RADIUS_CLIENT_RELOAD_SECONDS: "0"
    ports:
      - "${RADIUS_BIND_ADDRESS:-127.0.0.1}:${RADIUS_AUTH_PORT:-1812}:1812/udp"
      - "${RADIUS_BIND_ADDRESS:-127.0.0.1}:${RADIUS_ACCT_PORT:-1813}:1813/udp"
