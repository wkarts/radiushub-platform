name: Publicar imagens Docker (manual)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag ou commit a publicar
        required: false
        default: main
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-manual-${{ github.repository }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: radiushub-app
            dockerfile: docker/app/Dockerfile
          - name: radiushub-web
            dockerfile: docker/nginx/Dockerfile
          - name: radiushub-freeradius
            dockerfile: docker/freeradius/Dockerfile
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - id: version
        shell: bash
        run: |
          set -Eeuo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${version%.*}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            VCS_REF=${{ steps.version.outputs.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
