name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: PHP ${{ matrix.php }} / qualidade
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@v6
      - name: Preparar diretórios graváveis do Laravel
        run: mkdir -p bootstrap/cache storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite, sqlite3, mbstring, openssl, json, intl, curl, dom, bcmath
          coverage: none
          tools: composer:v2
      - uses: actions/cache@v5
        with:
          path: ~/.cache/composer/files
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.json', 'packages/asaas-sdk-argws/composer.json') }}
      - run: composer validate --strict --no-check-lock
      - run: composer install --no-interaction --prefer-dist
      - run: composer migrations:check
      - name: Preparar ambiente de testes
        run: cp .env.example .env.testing
      - run: composer lint
      - run: php artisan test --display-warnings
        env:
          APP_KEY: base64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
          RADIUS_CREDENTIAL_KEY: ci-radius-credential-key-long-enough-123456

  postgres:
    name: PostgreSQL 17
    runs-on: ubuntu-latest
    env:
      APP_KEY: base64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: radiushub_test
      DB_USERNAME: radiushub
      DB_PASSWORD: radiushub
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      RADIUS_CREDENTIAL_KEY: ci-radius-credential-key-long-enough-123456
      RADIUS_LOCAL_SECRET: ci-local-radius-secret-long-enough
      SEED_ADMIN_EMAIL: ci-postgres@example.com
      SEED_ADMIN_PASSWORD: CiPassword123!
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: radiushub_test
          POSTGRES_USER: radiushub
          POSTGRES_PASSWORD: radiushub
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U radiushub -d radiushub_test"
          --health-interval=5s --health-timeout=5s --health-retries=30
    steps:
      - uses: actions/checkout@v6
      - name: Preparar diretórios graváveis do Laravel
        run: mkdir -p bootstrap/cache storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, mbstring, openssl, json, intl, curl, dom, bcmath
          coverage: none
          tools: composer:v2
      - run: composer install --no-interaction --prefer-dist
      - run: composer migrations:check
      - run: cp .env.docker.postgres.example .env
      - run: php artisan migrate --force
      - run: php artisan db:seed --force
      - run: php artisan radiushub:doctor
      - run: php artisan radiushub:radius:render --output=storage/app/radius-ci --force

  mysql:
    name: MySQL 8.4
    runs-on: ubuntu-latest
    env:
      APP_KEY: base64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: radiushub_test
      DB_USERNAME: radiushub
      DB_PASSWORD: radiushub
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      RADIUS_CREDENTIAL_KEY: ci-radius-credential-key-long-enough-123456
      RADIUS_LOCAL_SECRET: ci-local-radius-secret-long-enough
      SEED_ADMIN_EMAIL: ci-mysql@example.com
      SEED_ADMIN_PASSWORD: CiPassword123!
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: radiushub_test
          MYSQL_USER: radiushub
          MYSQL_PASSWORD: radiushub
          MYSQL_ROOT_PASSWORD: root-radiushub
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uradiushub -pradiushub --silent"
          --health-interval=5s --health-timeout=5s --health-retries=30
    steps:
      - uses: actions/checkout@v6
      - name: Preparar diretórios graváveis do Laravel
        run: mkdir -p bootstrap/cache storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, mysqli, mbstring, openssl, json, intl, curl, dom, bcmath
          coverage: none
          tools: composer:v2
      - run: composer install --no-interaction --prefer-dist
      - run: composer migrations:check
      - run: cp .env.docker.mysql.example .env
      - run: php artisan migrate --force
      - run: php artisan db:seed --force
      - run: php artisan radiushub:doctor
      - run: php artisan radiushub:radius:render --output=storage/app/radius-ci --force

  docker-build:
    name: Docker / ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: app
            dockerfile: docker/app/Dockerfile
          - image: web
            dockerfile: docker/nginx/Dockerfile
          - image: freeradius
            dockerfile: docker/freeradius/Dockerfile
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          tags: radiushub-${{ matrix.image }}:ci
          cache-from: type=gha,scope=ci-${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.image }}
