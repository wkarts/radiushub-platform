# RadiusHub 1.3.3 - FreeRADIUS 3.2.x / MySQL 8+

auto_escape = yes
sql_user_name = "%{User-Name}"
event_timestamp_epoch = "%{%{integer:Event-Timestamp}:-%l}"
event_timestamp = "FROM_UNIXTIME(${event_timestamp_epoch})"

client_query = "\
    SELECT CRC32(id) AS id, radius_source_ip AS nasname, name AS shortname, 'other' AS type, \
           CASE WHEN radius_secret_ciphertext LIKE 'mysql:%' \
                THEN CAST(AES_DECRYPT(FROM_BASE64(SUBSTRING(radius_secret_ciphertext, 7)), UNHEX(SHA2('@@RADIUS_CREDENTIAL_KEY@@', 256))) AS CHAR CHARACTER SET utf8mb4) \
                ELSE NULL END AS secret, NULL AS server \
      FROM mikrotik_devices \
     WHERE active = 1 AND deleted_at IS NULL AND radius_secret_ciphertext LIKE 'mysql:%'"

authorize_check_query = "\
    WITH access_data AS ( \
        SELECT na.id, na.username, na.password_ciphertext, na.caller_id, COALESCE(na.simultaneous_use, p.simultaneous_use) AS simultaneous_use \
          FROM network_accesses na \
          JOIN subscribers s ON s.id = na.subscriber_id AND s.status = 'active' AND s.deleted_at IS NULL \
          JOIN internet_plans p ON p.id = na.internet_plan_id AND p.active = 1 AND p.deleted_at IS NULL \
          JOIN mikrotik_devices m ON m.company_id = na.company_id AND m.active = 1 AND m.deleted_at IS NULL AND (na.mikrotik_device_id IS NULL OR na.mikrotik_device_id = m.id) \
         WHERE na.username = '%{SQL-User-Name}' AND m.radius_source_ip = '%{%{NAS-IP-Address}:-%{Packet-Src-IP-Address}}' \
           AND na.status = 'active' AND na.deleted_at IS NULL AND na.password_ciphertext LIKE 'mysql:%' \
           AND (na.starts_at IS NULL OR na.starts_at <= NOW()) AND (na.expires_at IS NULL OR na.expires_at > NOW()) \
        UNION ALL \
        SELECT v.id, v.code AS username, v.password_ciphertext, NULL AS caller_id, v.max_devices AS simultaneous_use \
          FROM vouchers v \
          JOIN mikrotik_devices m ON m.company_id = v.company_id AND m.active = 1 AND m.deleted_at IS NULL AND (v.mikrotik_device_id IS NULL OR v.mikrotik_device_id = m.id) \
         WHERE v.code = '%{SQL-User-Name}' AND m.radius_source_ip = '%{%{NAS-IP-Address}:-%{Packet-Src-IP-Address}}' \
           AND v.status IN ('available','active') AND v.deleted_at IS NULL AND v.password_ciphertext LIKE 'mysql:%' \
           AND (v.valid_from IS NULL OR v.valid_from <= NOW()) AND (v.expires_at IS NULL OR v.expires_at > NOW()) \
        LIMIT 1 \
    ) \
    SELECT CRC32(CONCAT(id, ':password')) AS id, username, 'Cleartext-Password' AS attribute, CAST(AES_DECRYPT(FROM_BASE64(SUBSTRING(password_ciphertext, 7)), UNHEX(SHA2('@@RADIUS_CREDENTIAL_KEY@@', 256))) AS CHAR CHARACTER SET utf8mb4) AS value, ':=' AS op FROM access_data \
    UNION ALL SELECT CRC32(CONCAT(id, ':simultaneous')), username, 'Simultaneous-Use', CAST(simultaneous_use AS CHAR), ':=' FROM access_data \
    UNION ALL SELECT CRC32(CONCAT(id, ':caller')), username, 'Calling-Station-Id', caller_id, '==' FROM access_data WHERE caller_id IS NOT NULL AND caller_id <> '' \
    ORDER BY id"

authorize_reply_query = "\
    WITH access_data AS ( \
        SELECT na.id, na.username, na.static_ip, COALESCE(na.pool_name, p.address_pool) AS pool_name, p.rate_limit, p.session_timeout, p.idle_timeout, p.radius_reply_attributes, NULL AS data_limit_bytes \
          FROM network_accesses na \
          JOIN subscribers s ON s.id = na.subscriber_id AND s.status = 'active' AND s.deleted_at IS NULL \
          JOIN internet_plans p ON p.id = na.internet_plan_id AND p.active = 1 AND p.deleted_at IS NULL \
          JOIN mikrotik_devices m ON m.company_id = na.company_id AND m.active = 1 AND m.deleted_at IS NULL AND (na.mikrotik_device_id IS NULL OR na.mikrotik_device_id = m.id) \
         WHERE na.username = '%{SQL-User-Name}' AND m.radius_source_ip = '%{%{NAS-IP-Address}:-%{Packet-Src-IP-Address}}' \
           AND na.status = 'active' AND na.deleted_at IS NULL AND (na.starts_at IS NULL OR na.starts_at <= NOW()) AND (na.expires_at IS NULL OR na.expires_at > NOW()) \
        UNION ALL \
        SELECT v.id, v.code AS username, NULL AS static_ip, NULL AS pool_name, COALESCE(v.speed_limit, np.rate_limit, p.rate_limit), COALESCE(v.session_timeout_seconds, v.usage_time_limit_seconds, np.session_timeout_seconds, p.session_timeout), COALESCE(np.idle_timeout_seconds, p.idle_timeout), COALESCE(np.radius_attributes, p.radius_reply_attributes), v.data_limit_bytes \
          FROM vouchers v \
          LEFT JOIN network_profiles np ON np.id = v.network_profile_id AND np.active = 1 AND np.deleted_at IS NULL \
          LEFT JOIN internet_plans p ON p.id = v.internet_plan_id AND p.active = 1 AND p.deleted_at IS NULL \
          JOIN mikrotik_devices m ON m.company_id = v.company_id AND m.active = 1 AND m.deleted_at IS NULL AND (v.mikrotik_device_id IS NULL OR v.mikrotik_device_id = m.id) \
         WHERE v.code = '%{SQL-User-Name}' AND m.radius_source_ip = '%{%{NAS-IP-Address}:-%{Packet-Src-IP-Address}}' \
           AND v.status IN ('available','active') AND v.deleted_at IS NULL AND (v.valid_from IS NULL OR v.valid_from <= NOW()) AND (v.expires_at IS NULL OR v.expires_at > NOW()) \
        LIMIT 1 \
    ) \
    SELECT CRC32(CONCAT(id, ':rate')), username, 'Mikrotik-Rate-Limit', rate_limit, ':=' FROM access_data WHERE rate_limit IS NOT NULL AND rate_limit <> '' \
    UNION ALL SELECT CRC32(CONCAT(id, ':session')), username, 'Session-Timeout', CAST(session_timeout AS CHAR), ':=' FROM access_data WHERE session_timeout IS NOT NULL \
    UNION ALL SELECT CRC32(CONCAT(id, ':idle')), username, 'Idle-Timeout', CAST(idle_timeout AS CHAR), ':=' FROM access_data WHERE idle_timeout IS NOT NULL \
    UNION ALL SELECT CRC32(CONCAT(id, ':ip')), username, 'Framed-IP-Address', static_ip, ':=' FROM access_data WHERE static_ip IS NOT NULL AND static_ip <> '' \
    UNION ALL SELECT CRC32(CONCAT(id, ':pool')), username, 'Framed-Pool', pool_name, ':=' FROM access_data WHERE pool_name IS NOT NULL AND pool_name <> '' \
    UNION ALL SELECT CRC32(CONCAT(id, ':limit')), username, 'Mikrotik-Total-Limit', CAST(data_limit_bytes AS CHAR), ':=' FROM access_data WHERE data_limit_bytes IS NOT NULL \
    UNION ALL \
    SELECT CRC32(CONCAT(a.id, ':custom:', jt.attribute)), a.username, jt.attribute, JSON_UNQUOTE(JSON_EXTRACT(a.radius_reply_attributes, CONCAT('$.', CHAR(34), jt.attribute, CHAR(34)))), ':=' \
      FROM access_data a CROSS JOIN JSON_TABLE(COALESCE(JSON_KEYS(a.radius_reply_attributes), JSON_ARRAY()), '$[*]' COLUMNS (attribute VARCHAR(255) PATH '$')) jt \
    ORDER BY id"

# Atributos adicionais são lidos de radius_reply_attributes como objeto JSON chave/valor.

group_membership_query = "SELECT NULL WHERE FALSE"
authorize_group_check_query = "SELECT NULL WHERE FALSE"
authorize_group_reply_query = "SELECT NULL WHERE FALSE"
simul_count_query = "SELECT COUNT(*) FROM radius_accounting WHERE username = '%{SQL-User-Name}' AND nas_ip_address = '%{%{NAS-IP-Address}:-%{Packet-Src-IP-Address}}' AND acct_stop_time IS NULL"
simul_verify_query = "SELECT id, acct_session_id, username, nas_ip_address, nas_port_id, framed_ip_address, calling_station_id, framed_protocol FROM radius_accounting WHERE username = '%{SQL-User-Name}' AND nas_ip_address = '%{%{NAS-IP-Address}:-%{Packet-Src-IP-Address}}' AND acct_stop_time IS NULL"

accounting {
    reference = "%{tolower:type.%{%{Acct-Status-Type}:-%{Request-Processing-Stage}}.query}"
    type {
        accounting-on {
            query = "UPDATE radius_accounting SET acct_stop_time = ${....event_timestamp}, acct_update_time = ${....event_timestamp}, acct_session_time = GREATEST(0, TIMESTAMPDIFF(SECOND, acct_start_time, ${....event_timestamp})), acct_terminate_cause = '%{%{Acct-Terminate-Cause}:-NAS-Reboot}' WHERE nas_ip_address = '%{%{NAS-IP-Address}:-%{Packet-Src-IP-Address}}' AND acct_stop_time IS NULL"
        }
        accounting-off { query = "${..accounting-on.query}" }
        start {
            query = "\
                INSERT INTO radius_accounting (tenant_id, company_id, network_access_id, mikrotik_device_id, acct_session_id, acct_unique_id, username, realm, nas_ip_address, nas_port_id, nas_port_type, acct_start_time, acct_update_time, acct_stop_time, acct_session_time, acct_authentic, connect_info_start, acct_input_octets, acct_output_octets, called_station_id, calling_station_id, service_type, framed_protocol, framed_ip_address, framed_ipv6_address, delegated_ipv6_prefix) \
                SELECT m.tenant_id, m.company_id, na.id, m.id, '%{Acct-Session-Id}', NULLIF('%{Acct-Unique-Session-Id}', ''), '%{SQL-User-Name}', NULLIF('%{Realm}', ''), '%{%{NAS-IP-Address}:-%{Packet-Src-IP-Address}}', NULLIF('%{%{NAS-Port-Id}:-%{NAS-Port}}', ''), NULLIF('%{NAS-Port-Type}', ''), ${....event_timestamp}, ${....event_timestamp}, NULL, COALESCE(NULLIF('%{Acct-Session-Time}', ''), 0), NULLIF('%{Acct-Authentic}', ''), NULLIF('%{Connect-Info}', ''), (COALESCE(NULLIF('%{Acct-Input-Gigawords}', ''), 0) * 4294967296) + COALESCE(NULLIF('%{Acct-Input-Octets}', ''), 0), (COALESCE(NULLIF('%{Acct-Output-Gigawords}', ''), 0) * 4294967296) + COALESCE(NULLIF('%{Acct-Output-Octets}', ''), 0), NULLIF('%{Called-Station-Id}', ''), NULLIF('%{Calling-Station-Id}', ''), NULLIF('%{Service-Type}', ''), NULLIF('%{Framed-Protocol}', ''), NULLIF('%{Framed-IP-Address}', ''), NULLIF('%{Framed-IPv6-Address}', ''), NULLIF('%{Delegated-IPv6-Prefix}', '') \
                  FROM mikrotik_devices m LEFT JOIN network_accesses na ON na.company_id = m.company_id AND na.username = '%{SQL-User-Name}' AND na.deleted_at IS NULL \
                 WHERE m.radius_source_ip = '%{%{NAS-IP-Address}:-%{Packet-Src-IP-Address}}' AND m.active = 1 AND m.deleted_at IS NULL LIMIT 1 \
                ON DUPLICATE KEY UPDATE acct_unique_id = VALUES(acct_unique_id), acct_update_time = VALUES(acct_update_time), acct_stop_time = NULL, acct_terminate_cause = NULL, calling_station_id = VALUES(calling_station_id), framed_ip_address = VALUES(framed_ip_address)"
        }
        interim-update {
            query = "UPDATE radius_accounting SET acct_update_time = ${....event_timestamp}, acct_session_time = COALESCE(NULLIF('%{Acct-Session-Time}', ''), acct_session_time), acct_input_octets = (COALESCE(NULLIF('%{Acct-Input-Gigawords}', ''), 0) * 4294967296) + COALESCE(NULLIF('%{Acct-Input-Octets}', ''), 0), acct_output_octets = (COALESCE(NULLIF('%{Acct-Output-Gigawords}', ''), 0) * 4294967296) + COALESCE(NULLIF('%{Acct-Output-Octets}', ''), 0), framed_ip_address = COALESCE(NULLIF('%{Framed-IP-Address}', ''), framed_ip_address), framed_ipv6_address = COALESCE(NULLIF('%{Framed-IPv6-Address}', ''), framed_ipv6_address), delegated_ipv6_prefix = COALESCE(NULLIF('%{Delegated-IPv6-Prefix}', ''), delegated_ipv6_prefix), calling_station_id = COALESCE(NULLIF('%{Calling-Station-Id}', ''), calling_station_id) WHERE acct_session_id = '%{Acct-Session-Id}' AND nas_ip_address = '%{%{NAS-IP-Address}:-%{Packet-Src-IP-Address}}' AND acct_stop_time IS NULL"
            query = "\
                INSERT INTO radius_accounting (tenant_id, company_id, network_access_id, mikrotik_device_id, acct_session_id, acct_unique_id, username, realm, nas_ip_address, nas_port_id, nas_port_type, acct_start_time, acct_update_time, acct_session_time, acct_authentic, connect_info_start, acct_input_octets, acct_output_octets, called_station_id, calling_station_id, service_type, framed_protocol, framed_ip_address, framed_ipv6_address, delegated_ipv6_prefix) \
                SELECT m.tenant_id, m.company_id, na.id, m.id, '%{Acct-Session-Id}', NULLIF('%{Acct-Unique-Session-Id}', ''), '%{SQL-User-Name}', NULLIF('%{Realm}', ''), '%{%{NAS-IP-Address}:-%{Packet-Src-IP-Address}}', NULLIF('%{%{NAS-Port-Id}:-%{NAS-Port}}', ''), NULLIF('%{NAS-Port-Type}', ''), FROM_UNIXTIME(${....event_timestamp_epoch} - COALESCE(NULLIF('%{Acct-Session-Time}', ''), 0)), ${....event_timestamp}, COALESCE(NULLIF('%{Acct-Session-Time}', ''), 0), NULLIF('%{Acct-Authentic}', ''), NULLIF('%{Connect-Info}', ''), (COALESCE(NULLIF('%{Acct-Input-Gigawords}', ''), 0) * 4294967296) + COALESCE(NULLIF('%{Acct-Input-Octets}', ''), 0), (COALESCE(NULLIF('%{Acct-Output-Gigawords}', ''), 0) * 4294967296) + COALESCE(NULLIF('%{Acct-Output-Octets}', ''), 0), NULLIF('%{Called-Station-Id}', ''), NULLIF('%{Calling-Station-Id}', ''), NULLIF('%{Service-Type}', ''), NULLIF('%{Framed-Protocol}', ''), NULLIF('%{Framed-IP-Address}', ''), NULLIF('%{Framed-IPv6-Address}', ''), NULLIF('%{Delegated-IPv6-Prefix}', '') \
                  FROM mikrotik_devices m LEFT JOIN network_accesses na ON na.company_id = m.company_id AND na.username = '%{SQL-User-Name}' AND na.deleted_at IS NULL \
                 WHERE m.radius_source_ip = '%{%{NAS-IP-Address}:-%{Packet-Src-IP-Address}}' AND m.active = 1 AND m.deleted_at IS NULL LIMIT 1 \
                ON DUPLICATE KEY UPDATE acct_update_time = VALUES(acct_update_time)"
        }
        stop {
            query = "UPDATE radius_accounting SET acct_stop_time = ${....event_timestamp}, acct_update_time = ${....event_timestamp}, acct_session_time = COALESCE(NULLIF('%{Acct-Session-Time}', ''), acct_session_time), acct_input_octets = (COALESCE(NULLIF('%{Acct-Input-Gigawords}', ''), 0) * 4294967296) + COALESCE(NULLIF('%{Acct-Input-Octets}', ''), 0), acct_output_octets = (COALESCE(NULLIF('%{Acct-Output-Gigawords}', ''), 0) * 4294967296) + COALESCE(NULLIF('%{Acct-Output-Octets}', ''), 0), acct_terminate_cause = NULLIF('%{Acct-Terminate-Cause}', ''), connect_info_stop = NULLIF('%{Connect-Info}', ''), framed_ip_address = COALESCE(NULLIF('%{Framed-IP-Address}', ''), framed_ip_address), calling_station_id = COALESCE(NULLIF('%{Calling-Station-Id}', ''), calling_station_id) WHERE acct_session_id = '%{Acct-Session-Id}' AND nas_ip_address = '%{%{NAS-IP-Address}:-%{Packet-Src-IP-Address}}' AND acct_stop_time IS NULL"
            query = "\
                INSERT INTO radius_accounting (tenant_id, company_id, network_access_id, mikrotik_device_id, acct_session_id, acct_unique_id, username, realm, nas_ip_address, nas_port_id, nas_port_type, acct_start_time, acct_update_time, acct_stop_time, acct_session_time, acct_authentic, connect_info_start, connect_info_stop, acct_input_octets, acct_output_octets, called_station_id, calling_station_id, acct_terminate_cause, service_type, framed_protocol, framed_ip_address, framed_ipv6_address, delegated_ipv6_prefix) \
                SELECT m.tenant_id, m.company_id, na.id, m.id, '%{Acct-Session-Id}', NULLIF('%{Acct-Unique-Session-Id}', ''), '%{SQL-User-Name}', NULLIF('%{Realm}', ''), '%{%{NAS-IP-Address}:-%{Packet-Src-IP-Address}}', NULLIF('%{%{NAS-Port-Id}:-%{NAS-Port}}', ''), NULLIF('%{NAS-Port-Type}', ''), FROM_UNIXTIME(${....event_timestamp_epoch} - COALESCE(NULLIF('%{Acct-Session-Time}', ''), 0)), ${....event_timestamp}, ${....event_timestamp}, COALESCE(NULLIF('%{Acct-Session-Time}', ''), 0), NULLIF('%{Acct-Authentic}', ''), NULLIF('%{Connect-Info}', ''), NULLIF('%{Connect-Info}', ''), (COALESCE(NULLIF('%{Acct-Input-Gigawords}', ''), 0) * 4294967296) + COALESCE(NULLIF('%{Acct-Input-Octets}', ''), 0), (COALESCE(NULLIF('%{Acct-Output-Gigawords}', ''), 0) * 4294967296) + COALESCE(NULLIF('%{Acct-Output-Octets}', ''), 0), NULLIF('%{Called-Station-Id}', ''), NULLIF('%{Calling-Station-Id}', ''), NULLIF('%{Acct-Terminate-Cause}', ''), NULLIF('%{Service-Type}', ''), NULLIF('%{Framed-Protocol}', ''), NULLIF('%{Framed-IP-Address}', ''), NULLIF('%{Framed-IPv6-Address}', ''), NULLIF('%{Delegated-IPv6-Prefix}', '') \
                  FROM mikrotik_devices m LEFT JOIN network_accesses na ON na.company_id = m.company_id AND na.username = '%{SQL-User-Name}' AND na.deleted_at IS NULL \
                 WHERE m.radius_source_ip = '%{%{NAS-IP-Address}:-%{Packet-Src-IP-Address}}' AND m.active = 1 AND m.deleted_at IS NULL LIMIT 1 \
                ON DUPLICATE KEY UPDATE acct_stop_time = VALUES(acct_stop_time), acct_update_time = VALUES(acct_update_time), acct_session_time = VALUES(acct_session_time)"
        }
        accounting { query = "SELECT 1" }
    }
}

post-auth {
    query = "\
        INSERT INTO radius_auth_attempts (tenant_id, company_id, network_access_id, mikrotik_device_id, username, nas_ip_address, calling_station_id, reply, reason, request_attributes, created_at) \
        SELECT m.tenant_id, m.company_id, na.id, m.id, '%{SQL-User-Name}', '%{%{NAS-IP-Address}:-%{Packet-Src-IP-Address}}', NULLIF('%{Calling-Station-Id}', ''), IF('%{reply:Packet-Type}' = 'Access-Accept', 'accept', 'reject'), NULLIF('%{reply:Reply-Message}', ''), JSON_OBJECT('service_type', '%{Service-Type}', 'nas_port_type', '%{NAS-Port-Type}', 'called_station_id', '%{Called-Station-Id}'), NOW() \
          FROM mikrotik_devices m LEFT JOIN network_accesses na ON na.company_id = m.company_id AND na.username = '%{SQL-User-Name}' AND na.deleted_at IS NULL \
         WHERE m.radius_source_ip = '%{%{NAS-IP-Address}:-%{Packet-Src-IP-Address}}' AND m.deleted_at IS NULL LIMIT 1"
}
